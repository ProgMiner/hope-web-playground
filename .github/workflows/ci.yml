name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TREE_SITTER_CLI_VERSION: 0.26.6
  JAVA_VERSION: "21"
  # monaco-themes@0.4.8 requires Node >=22 (engines field).
  NODE_VERSION: "22"
  KTLINT_VERSION: "1.5.0"

# -----------------------------------------------------------------------------
# Pipeline overview
#
#   build  ─────────────► (blocking)         compiles everything
#     │
#     ├──► test-kotlin       (non-blocking)  ./gradlew check (JVM + wasmJs)
#     ├──► test-tree-sitter  (non-blocking)  tree-sitter corpus tests
#     ├──► test-hope-web     (non-blocking)  svelte-check
#     ├──► lint-hope-web     (non-blocking)  prettier + eslint
#     └──► lint-kotlin       (non-blocking)  ktlint (standalone CLI)
#
# `continue-on-error: true` at job level means a failed test job is rendered
# as ❌ red in the PR check list, but the overall workflow conclusion stays
# success (only `build` gates the workflow). Branch protection should require
# only the `build` check.
# -----------------------------------------------------------------------------

jobs:
  # =========================================================================
  # BUILD — blocking. Compiles all Kotlin targets, builds tree-sitter wasm,
  # produces the SvelteKit production bundle. No tests are run here.
  # =========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - run: chmod +x ./gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            hope-web/package-lock.json
            tree-sitter-hope/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli@${{ env.TREE_SITTER_CLI_VERSION }}

      - name: "tree-sitter-hope: install + generate + build wasm"
        working-directory: tree-sitter-hope
        run: |
          npm ci
          tree-sitter generate
          tree-sitter build --wasm

      - name: "Gradle: assemble (compile all targets)"
        run: ./gradlew assemble --stacktrace

      - name: "Gradle: wasmJs node distribution"
        run: ./gradlew wasmJsNodeProductionRun --stacktrace

      # `npm ci` followed by an explicit install of the Linux-specific
      # rollup binary works around npm/cli#4828: optional native deps in
      # rollup are sometimes skipped when package-lock.json was generated
      # on a different platform (e.g. macOS dev machines).
      - name: "hope-web: install + locals + production build"
        working-directory: hope-web
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm run locals
          npm run build

  # =========================================================================
  # TEST: Kotlin — JVM + wasmJs unit tests (HopecCliTest, TreeSitterTest).
  # Non-blocking.
  # =========================================================================
  test-kotlin:
    name: Tests · Kotlin (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - run: chmod +x ./gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tree-sitter-hope/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli@${{ env.TREE_SITTER_CLI_VERSION }}

      # The wasmJs Kotlin test target loads tree-sitter-hope.wasm at runtime,
      # so we must produce it before running the test suite.
      - name: "tree-sitter-hope: build wasm (test prerequisite)"
        working-directory: tree-sitter-hope
        run: |
          npm ci
          tree-sitter generate
          tree-sitter build --wasm

      - name: "Gradle: check (JVM + wasmJs tests)"
        run: ./gradlew check --stacktrace

      - name: Upload Gradle test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  # =========================================================================
  # TEST: tree-sitter grammar corpus.
  # NOTE: corpus fixtures predate the current grammar.js (removed/renamed
  # nodes scope_expression, postfix_expression, dot_expression, lident,
  # let_expression, simple_pattern; samples use single `=` while grammar
  # requires `==`). This job will fail until the corpus is refreshed.
  # Non-blocking.
  # =========================================================================
  test-tree-sitter:
    name: Tests · tree-sitter corpus (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tree-sitter-hope/package-lock.json

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli@${{ env.TREE_SITTER_CLI_VERSION }}

      - name: "tree-sitter-hope: install + generate"
        working-directory: tree-sitter-hope
        run: |
          npm ci
          tree-sitter generate

      - name: "tree-sitter-hope: corpus tests"
        working-directory: tree-sitter-hope
        run: tree-sitter test

  # =========================================================================
  # TEST: hope-web svelte-check (TypeScript + Svelte type errors).
  # Non-blocking.
  # =========================================================================
  test-hope-web:
    name: Tests · hope-web svelte-check (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - run: chmod +x ./gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            hope-web/package-lock.json
            tree-sitter-hope/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli@${{ env.TREE_SITTER_CLI_VERSION }}

      # hope-web depends on artifacts produced by both tree-sitter and the
      # Kotlin/WASM driver; svelte-check needs them to resolve imports.
      - name: "tree-sitter-hope: build wasm"
        working-directory: tree-sitter-hope
        run: |
          npm ci
          tree-sitter generate
          tree-sitter build --wasm

      - name: "Gradle: wasmJs node distribution"
        run: ./gradlew wasmJsNodeProductionRun --stacktrace

      # See note in `build` job about npm/cli#4828.
      - name: "hope-web: install + locals"
        working-directory: hope-web
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm run locals

      - name: "hope-web: svelte-check"
        working-directory: hope-web
        run: npm run check

  # =========================================================================
  # LINT: hope-web prettier + eslint. Non-blocking.
  # =========================================================================
  lint-hope-web:
    name: Lint · hope-web (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: hope-web/package-lock.json

      # See note in `build` job about npm/cli#4828.
      - name: "hope-web: install"
        working-directory: hope-web
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: "hope-web: lint (prettier + eslint)"
        working-directory: hope-web
        run: npm run lint

  # =========================================================================
  # LINT: Kotlin via standalone ktlint CLI. Non-blocking.
  # Uses the official ktlint shadowed jar from
  # https://github.com/pinterest/ktlint/releases — no Gradle plugin required,
  # so the project's build.gradle.kts files stay untouched.
  # Lints the Kotlin sources of every multiplatform module in the repo.
  # =========================================================================
  lint-kotlin:
    name: Lint · Kotlin ktlint (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache ktlint jar
        id: ktlint-cache
        uses: actions/cache@v4
        with:
          path: ~/.ktlint
          key: ktlint-${{ env.KTLINT_VERSION }}

      - name: Download ktlint
        if: steps.ktlint-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.ktlint
          curl -sSLo ~/.ktlint/ktlint \
            https://github.com/pinterest/ktlint/releases/download/${{ env.KTLINT_VERSION }}/ktlint
          chmod +x ~/.ktlint/ktlint

      - name: "ktlint: check Kotlin sources"
        # Selectors cover sources from every module (codegen, core, driver,
        # parser, renamer, typecheck) across commonMain / jvmMain / jvmTest /
        # wasmJsMain / commonTest. ktlint 1.x reporters: baseline, checkstyle,
        # format, html, json, plain, plain-summary, sarif (no `github`).
        # `plain` is consumed below by an awk filter that emits
        # GitHub Actions workflow-command annotations on the PR diff.
        run: |
          set +e
          ~/.ktlint/ktlint --reporter=plain "**/src/**/*.kt" "**/src/**/*.kts" \
            | tee ktlint-report.txt
          status=${PIPESTATUS[0]}
          # Convert "path:line:col: message" lines into ::error annotations.
          awk -F: '
            /^[^[:space:]].*:[0-9]+:[0-9]+:/ {
              file=$1; line=$2; col=$3;
              msg=$0;
              sub(/^[^:]+:[0-9]+:[0-9]+:[[:space:]]*/, "", msg);
              printf "::error file=%s,line=%s,col=%s::%s\n", file, line, col, msg
            }
          ' ktlint-report.txt
          exit "$status"
